<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus Tint</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="amg-bg"></div>

<header class="topbar">
  <div class="container topbar-inner">
    <div class="brand">NEXUS TINT</div>

    <nav class="nav">
      <a href="#inicio" data-es="Inicio" data-en="Home">Inicio</a>
      <a href="#servicios" data-es="Servicios" data-en="Services">Servicios</a>
      <a href="#reservas" data-es="Reservas" data-en="Bookings">Reservas</a>
      <a href="#contacto" data-es="Contacto" data-en="Contact">Contacto</a>
    </nav>

    <div class="lang">
      <button id="btn-es" class="lang-btn active">ES</button>
      <button id="btn-en" class="lang-btn">EN</button>
    </div>
  </div>
</header>

<section class="hero" id="inicio">
  <div class="container hero-center">

    <img src="logo.png" class="logo">

    <h1 data-es="Convierte tu vehículo en una experiencia de lujo"
        data-en="Turn your vehicle into a luxury experience">
    </h1>

    <p data-es="Polarizados premium, iluminación, cámaras y mejoras diseñadas para una apariencia exclusiva."
       data-en="Premium tint, lighting, cameras and upgrades designed for an exclusive look.">
    </p>

    <div class="buttons">
      <a href="#reservas" class="btn primary"
         data-es="Reservar cita"
         data-en="Book appointment"></a>

      <a href="https://wa.me/12244910412" class="btn secondary">WhatsApp</a>
    </div>

  </div>
</section>

<!-- SERVICIOS -->
<section class="services" id="servicios">
  <div class="container">
    <h2 data-es="Servicios premium" data-en="Premium services"></h2>

    <div class="services-grid">
      <div class="card">Polarizado</div>
      <div class="card">Luces LED</div>
      <div class="card">Cámara</div>
      <div class="card">Pantallas</div>
      <div class="card">Accesorios</div>
      <div class="card">Instalación</div>
    </div>
  </div>
</section>

<!-- FORMULARIO AMG -->
<section class="booking" id="reservas">
  <div class="container">

    <h2 data-es="Reserva tu cita" data-en="Book your appointment"></h2>

    <form class="form">

      <input id="nombre" placeholder="Nombre">
      <input id="telefono" placeholder="Teléfono">

      <!-- NUEVO NIVEL AMG -->
      <div class="form-grid">
        <input id="marca" placeholder="Marca">
        <input id="modelo" placeholder="Modelo">
      </div>

      <input id="anio" placeholder="Año">

      <select id="servicio">
        <option>Servicio</option>
        <option>Polarizado</option>
        <option>Luces</option>
        <option>Cámara</option>
        <option>Radio</option>
      </select>

      <select id="polarizado">
        <option>% polarizado</option>
        <option>5%</option>
        <option>15%</option>
        <option>20%</option>
        <option>35%</option>
      </select>

      <div class="form-grid">
        <input type="date" id="fecha">
        <input type="time" id="hora">
      </div>

      <button onclick="enviarWhatsApp()" type="button" class="btn primary full-btn">
        Enviar por WhatsApp
      </button>

    </form>

  </div>
</section>

<section class="contact" id="contacto">
  <div class="container">
    <h2>Contacto</h2>
    <p>📞 224-491-0412</p>
    <p>📧 nexustintc@gmail.com</p>
  </div>
</section>

<script src="script.js"></script>

</body>
</html>
